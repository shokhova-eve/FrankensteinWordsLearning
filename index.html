<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Specimen Journal — Frankenstein Vocabulary</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/stats.css">
<link rel="stylesheet" href="css/tabs.css">
<link rel="stylesheet" href="css/toolbar.css">
<link rel="stylesheet" href="css/specimen.css">
<link rel="stylesheet" href="css/pagination.css">
<link rel="stylesheet" href="css/form.css">
<link rel="stylesheet" href="css/compose.css">
<link rel="stylesheet" href="css/compose-controls.css">
<link rel="stylesheet" href="css/entry.css">
<link rel="stylesheet" href="css/misc.css">
<link rel="stylesheet" href="css/recite.css">
<link rel="stylesheet" href="css/recite-controls.css">
</head>
<body>
<div class="sheet">

  <header>
    <div class="kicker">Laboratory Notebook · Est. Dec. 11th, 17—</div>
    <h1>Specimen Journal</h1>
    <div class="subtitle">Vocabulary collected from Mary Shelley's <em>Frankenstein</em></div>
    <div class="stats" id="statsRow"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="specimens">Specimens</button>
	<button class="tab" data-tab="recite">Recite</button>
    <button class="tab" data-tab="compose">Compose</button>
  </div>

  <!-- SPECIMENS PANEL -->
  <div class="panel active" id="panel-specimens">
    <div class="toolbar">
      <div class="filter-group">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="learning">Learning</button>
        <button class="chip" data-filter="mastered">Mastered</button>
		<div class="search-wrapper">
			<span class="search-symbol">&#x1F50E;&#xFE0E;</span>
			<input class="search-input" type="search" id="searchInput" placeholder="Search words...">
		</div>
      </div>
      <button class="shuffle-btn" id="shuffleWords">Shuffle</button>
    </div>

    <div id="specimenList"><div class="loading">Loading specimens…</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- RECITE PANEL -->
  <div class="panel" id="panel-recite">
	<div class="recite-controls">
		<div class="timer-group">
			<button class="timer active" data-seconds="15">⏲️ 15</button>
			<button class="timer" data-seconds="30">⏲️ 30</button>
    	</div>
		<button class="start-btn" id="startRecite">Start</button>
	</div>
	<div id="reciteCard">
    	<div class="specimen recite-placeholder">Recitation is not started yet.</div>
  	</div>
  </div>

  <!-- COMPOSE PANEL -->
  <div class="panel" id="panel-compose">
    <div class="compose-card">
	  <div class="compose-controls">
		<div class="roll-x-words-group">
			<button class="roll-x-words" data-x-words="1">1</button>
			<button class="roll-x-words" data-x-words="2">2</button>
			<button class="roll-x-words" data-x-words="3">3</button>
			<button class="roll-x-words active" data-x-words="4">4</button>
			<button class="roll-x-words" data-wildcard="y">+📇 wildcard</button>
    	</div>
	  </div>
      <div class="roll-row">
        <div class="roll-words" id="rolledWords">Tap "Roll words" for a random prompt.</div>
        <button class="roll-btn" id="rollBtn">🎲 Roll words</button>
      </div>
      <input type="text" id="entryTitle" maxlength="150" placeholder="Title your entry (optional)">
      <textarea id="entryBody" placeholder="Write a short passage using the rolled words…"></textarea>
      <div class="form-actions" style="margin-top:10px;">
        <button class="add-btn" id="saveEntry">Save entry</button>
		<span class="word-counter" id="wordCounter">0 words</span>
      </div>
    </div>
    <div id="entryList"><div class="loading">Loading entries…</div></div>
  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
